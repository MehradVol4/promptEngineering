<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  :root{
    --bg:#0f1117; --panel:#181b24; --panel-2:#1f2430;
    --border:#2a3040; --text:#e6e8ee; --muted:#8b93a7;
    --accent:#6d8bff; --accent-hover:#5a79f5; --danger:#ff5c6c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;padding:40px 20px;line-height:1.5;
  }
  .wrap{max-width:720px;margin:0 auto}
  header{margin-bottom:28px}
  h1{font-size:26px;font-weight:650;letter-spacing:.3px}
  header p{color:var(--muted);margin-top:6px;font-size:14px}

  .card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:14px;padding:22px;margin-bottom:28px;
  }
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input,textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--border);
    color:var(--text);border-radius:9px;padding:11px 13px;font-size:14px;
    font-family:inherit;resize:vertical;margin-bottom:16px;transition:border .15s;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:110px}
  button{
    cursor:pointer;border:none;font-family:inherit;font-weight:600;
    border-radius:9px;transition:background .15s,transform .05s;
  }
  button:active{transform:translateY(1px)}
  .save-btn{background:var(--accent);color:#fff;padding:11px 22px;font-size:14px}
  .save-btn:hover{background:var(--accent-hover)}

  .list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .list-head h2{font-size:17px;font-weight:600}
  .count{color:var(--muted);font-size:13px}

  .prompt{
    background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:16px 18px;margin-bottom:12px;
  }
  .prompt-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .prompt-title{font-size:15px;font-weight:600;word-break:break-word}
  .prompt-content{color:var(--muted);font-size:14px;margin-top:8px;white-space:pre-wrap;word-break:break-word}
  .del-btn{
    background:transparent;color:var(--danger);border:1px solid var(--border);
    padding:6px 12px;font-size:12px;flex-shrink:0;
  }
  .del-btn:hover{background:rgba(255,92,108,.12);border-color:var(--danger)}

  .empty{
    text-align:center;color:var(--muted);padding:34px 10px;
    border:1px dashed var(--border);border-radius:12px;font-size:14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Prompt Library</h1>
      <p>Save, browse, and manage your favorite prompts. Stored locally in your browser.</p>
    </header>

    <div class="card">
      <label for="title">Title</label>
      <input id="title" type="text" placeholder="e.g. Blog post outline generator" maxlength="120">
      <label for="content">Prompt</label>
      <textarea id="content" placeholder="Write your prompt here..."></textarea>
      <button class="save-btn" id="saveBtn">Save prompt</button>
    </div>

    <div class="list-head">
      <h2>Saved prompts</h2>
      <span class="count" id="count"></span>
    </div>
    <div id="list"></div>
  </div>

<script>
  const KEY = "promptLibrary";
  const titleEl = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const listEl = document.getElementById("list");
  const countEl = document.getElementById("count");

  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch{ return []; } }
  function persist(items){ localStorage.setItem(KEY, JSON.stringify(items)); }

  function render(){
    const items = load();
    countEl.textContent = items.length ? items.length + (items.length===1?" prompt":" prompts") : "";
    if(!items.length){
      listEl.innerHTML = '<div class="empty">No prompts yet. Add one above to get started.</div>';
      return;
    }
    listEl.innerHTML = "";
    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "prompt";

      const top = document.createElement("div");
      top.className = "prompt-top";

      const t = document.createElement("div");
      t.className = "prompt-title";
      t.textContent = item.title;

      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "Delete";
      del.onclick = () => removePrompt(item.id);

      top.appendChild(t);
      top.appendChild(del);

      const c = document.createElement("div");
      c.className = "prompt-content";
      c.textContent = item.content;

      card.appendChild(top);
      card.appendChild(c);
      listEl.appendChild(card);
    });
  }

  function savePrompt(){
    const title = titleEl.value.trim();
    const content = contentEl.value.trim();
    if(!title || !content){
      alert("Please enter both a title and a prompt.");
      return;
    }
    const items = load();
    items.unshift({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), title, content });
    persist(items);
    titleEl.value = "";
    contentEl.value = "";
    titleEl.focus();
    render();
  }

  function removePrompt(id){
    persist(load().filter(p => p.id !== id));
    render();
  }

  document.getElementById("saveBtn").addEventListener("click", savePrompt);
  render();
</script>
</body>
</html>
